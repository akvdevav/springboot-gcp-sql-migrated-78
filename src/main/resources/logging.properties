# Logging configuration for java.util.logging
# Set the default log level for all loggers
.level = INFO

# Define handlers to be used
handlers = java.util.logging.ConsoleHandler

# ConsoleHandler configuration
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Suppress the default log messages from the JDK
org.apache.catalina.startup.ContextConfig.level = WARNING
org.apache.catalina.startup.HostConfig.level = WARNING
org.apache.coyote.http11.Http11NioProtocol.level = WARNING
# Removed Logback-specific filter configuration as it does not apply to java.util.logging.