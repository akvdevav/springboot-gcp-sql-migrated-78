spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.continue-on-error=true
spring.sql.init.mode=always
spring.sql.init.platform=postgres

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Disable Spring Data Web auto‑configuration that requires Jackson (ObjectMapper) when Jackson is not present
spring.data.web.pageable.enabled=false

# RabbitMQ (auto‑create queues/exchanges via application code)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Valkey (Redis compatible)
spring.redis.host=localhost
spring.redis.port=6379

# GCP placeholders (retain if used elsewhere)
spring.cloud.gcp.project-id=
spring.cloud.gcp.credentials.location=file:./src/main/resources/keys-gcp.json
spring.cloud.gcp.sql.database-name=
spring.cloud.gcp.sql.instance-connection-name=

# Explicitly set web application type to avoid missing ServletWebServerFactory when running as a WAR with provided servlet container
spring.main.web-application-type=servlet