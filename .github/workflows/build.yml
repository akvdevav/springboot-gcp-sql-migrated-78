# Auto-generated by SBUM
# This workflow supports monorepos: it will find and build/test all Maven/Gradle projects in the repo.
# You can manually trigger this workflow from the GitHub Actions web UI.
name: Build & Runtime Boot Test
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  # Uncomment to allow calling from other workflows
  # workflow_call:
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compile All Projects (Monorepo-aware)
        run: |
          echo 'Compiling module: .'
          cd .
          if [ -f 'pom.xml' ]; then mvn -B clean compile -DskipTests; else gradle clean classes -x test; fi
          cd -

  boot-test:
    needs: compile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: [5432:5432]
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports: [5672:5672, 15672:15672]
      valkey:
        image: valkey/valkey:latest
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Runtime Boot Test (Monorepo-aware)
        run: |
          echo '========================================'
          echo 'Boot Testing module: .'
          cd .
          echo 'Executing Spring Boot Run...'
          if [ -f 'pom.xml' ]; then mvn spring-boot:run -DskipTests; else gradle bootRun -x test; fi > boot.log 2>&1 &
          PID=$!
          BOOTED=false
          for i in {1..60}; do
            sleep 2
            if grep -q 'Started .* in .* seconds' boot.log; then
              echo '✅ Application booted successfully!'
              kill -9 $PID
              BOOTED=true
              break
            fi
            if grep -q 'APPLICATION FAILED TO START' boot.log || grep -q 'BUILD FAILURE' boot.log || grep -q 'Exception:' boot.log || ! kill -0 $PID 2>/dev/null; then
              echo '❌ Application crashed during startup!'
              cat boot.log
              exit 1
            fi
          done
          if [ "$BOOTED" = false ]; then
             echo '⏳ Timeout waiting for application to start. Printing logs and failing.'
             kill -9 $PID
             cat boot.log
             exit 1
          fi
          cd -
